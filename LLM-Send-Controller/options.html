<!DOCTYPE html>
<html>

<head>
    <title>Smart Enter Settings</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            padding: 30px;
            width: 450px;
        }

        h1 {
            color: #38bdf8;
            margin: 0;
        }

        .tagline {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .mode-option {
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .mode-option input {
            margin-top: 5px;
        }

        .setting-group {
            margin-left: 25px;
            margin-top: 10px;
            padding-left: 15px;
            border-left: 2px solid #334155;
        }

        #recordButton {
            padding: 10px;
            width: 100%;
            background: #334155;
            color: white;
            border: 1px solid #475569;
            border-radius: 6px;
            cursor: pointer;
        }

        #recordButton.listening {
            background: #0ea5e9;
            animation: pulse 1.5s infinite;
        }

        /* Playground Styles */
        #playground {
            background: #020617;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #38bdf8;
        }

        #demoChat {
            width: 100%;
            height: 60px;
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 8px;
            box-sizing: border-box;
            resize: none;
        }

        .status-pill {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 10px;
        }

        .intercepted {
            background: #f59e0b;
            color: #000;
        }

        .sent {
            background: #10b981;
            color: #fff;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <h1>Smart Enter</h1>
    <p class="tagline">The "Oops Detector" for your LLM Prompts.</p>

    <div class="card">
        <label class="mode-option">
            <input type="radio" name="mode" value="strict">
            <div>
                <strong>Absolute Control (Strict Mode)</strong>
                <div style="font-size: 12px; color: #94a3b8;">Enter only creates new lines. Use a custom hotkey to send.
                </div>
            </div>
        </label>
        <div id="strictSettings" class="setting-group">
            <button id="recordButton">Click to set Hotkey</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">

        <label class="mode-option">
            <input type="radio" name="mode" value="smart" checked>
            <div>
                <strong>The Safety Net (Smart Mode)</strong>
                <div style="font-size: 12px; color: #94a3b8;">Enter sends normally, unless you keep typing immediately.
                </div>
            </div>
        </label>
        <div id="smartSettings" class="setting-group">
            <label style="font-size: 12px;">Grace Period: <span id="periodVal">500</span>ms</label>
            <input type="range" id="gracePeriod" min="200" max="1500" step="50" value="500">
        </div>
    </div>

    <div id="playground">
        <div style="font-size: 12px; margin-bottom: 8px; color: #38bdf8; font-weight: bold;">LIVE TEST DRIVE</div>
        <textarea id="demoChat" placeholder="Try hitting Enter vs typing fast..."></textarea>
        <div id="demoStatus"></div>
    </div>

    <script src="options.js"></script>
</body>

</html>
